<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial">
  <title id="title">Prefix-cache radix tree shared across three concurrent Qwen3 chat sessions on a single local model</title>
  <desc id="desc">A radix tree diagram. The root holds the shared 4,800-token system prompt plus tool definitions and is drawn as a wide green block. Three branches descend from the root to sessions A, B, and C. Session A has two stacked turn blocks. Session B has one. Session C has three. Below the tree a comparison line shows naive caches at 16,400 tokens versus the radix tree at 6,800 tokens, a 58 percent reduction. A footer note describes the LRU eviction policy walking from leaves toward the root.</desc>

  <defs>
    <linearGradient id="bgFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="rootFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5dbb89"/>
      <stop offset="100%" stop-color="#3f9b6b"/>
    </linearGradient>
    <linearGradient id="turnFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3eb1c8"/>
      <stop offset="100%" stop-color="#2a8aa0"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7d97"/>
    </marker>
  </defs>

  <rect width="880" height="560" fill="url(#bgFade)"/>

  <!-- Header -->
  <text x="40" y="38" fill="#e8edf5" font-size="20" font-weight="700">Prefix-cache radix tree across three Qwen3 chat sessions</text>
  <text x="40" y="60" fill="#8ea0b8" font-size="13">Shared root: 4,800 tokens of system prompt + 12 tool definitions, computed once</text>

  <!-- Root node -->
  <g transform="translate(140, 88)">
    <rect x="0" y="0" width="600" height="62" rx="6" fill="url(#rootFill)" stroke="#1a2538" stroke-width="0.5"/>
    <text x="300" y="22" fill="#0f1729" font-size="14" font-weight="700" text-anchor="middle">SHARED ROOT</text>
    <text x="300" y="42" fill="#0f1729" font-size="13" text-anchor="middle" font-weight="600">4,800 tokens · system prompt · tool defs · ChatML preamble</text>
    <text x="300" y="56" fill="#0e3a26" font-size="11" text-anchor="middle">resident KV: 460 MB at FP16 · GQA shape, 96 KB/token</text>
  </g>

  <!-- Connecting lines from root to session columns -->
  <g stroke="#6b7d97" stroke-width="1.5" fill="none" stroke-dasharray="4,3">
    <!-- center bottom of root: x=440, y=150 -->
    <path d="M 240 150 L 240 175 L 175 175 L 175 200" marker-end="url(#arrow)"/>
    <path d="M 440 150 L 440 200" marker-end="url(#arrow)"/>
    <path d="M 640 150 L 640 175 L 705 175 L 705 200" marker-end="url(#arrow)"/>
  </g>

  <!-- Session column labels -->
  <g font-size="12" font-weight="700" fill="#c1cdde" text-anchor="middle">
    <text x="175" y="195">SESSION A</text>
    <text x="440" y="195">SESSION B</text>
    <text x="705" y="195">SESSION C</text>
  </g>

  <!-- Session A: two stacked turns -->
  <g transform="translate(95, 210)">
    <!-- turn 1 -->
    <rect x="0" y="0" width="160" height="44" rx="5" fill="url(#turnFill)" stroke="#1a2538" stroke-width="0.5"/>
    <text x="80" y="18" fill="#0f1729" font-size="12" font-weight="700" text-anchor="middle">turn 1</text>
    <text x="80" y="34" fill="#0f1729" font-size="11" text-anchor="middle">user + reply: 320 tokens</text>
    <!-- arrow -->
    <line x1="80" y1="46" x2="80" y2="56" stroke="#6b7d97" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- turn 2 -->
    <rect x="0" y="58" width="160" height="44" rx="5" fill="url(#turnFill)" stroke="#1a2538" stroke-width="0.5"/>
    <text x="80" y="76" fill="#0f1729" font-size="12" font-weight="700" text-anchor="middle">turn 2</text>
    <text x="80" y="92" fill="#0f1729" font-size="11" text-anchor="middle">user + reply: 320 tokens</text>
    <!-- total -->
    <text x="80" y="124" fill="#c1cdde" font-size="11" text-anchor="middle" font-weight="600">total: 5,440 tokens</text>
    <text x="80" y="140" fill="#8ea0b8" font-size="10" text-anchor="middle">delta-only prefill at turn 2</text>
  </g>

  <!-- Session B: one turn -->
  <g transform="translate(360, 210)">
    <rect x="0" y="0" width="160" height="44" rx="5" fill="url(#turnFill)" stroke="#1a2538" stroke-width="0.5"/>
    <text x="80" y="18" fill="#0f1729" font-size="12" font-weight="700" text-anchor="middle">turn 1</text>
    <text x="80" y="34" fill="#0f1729" font-size="11" text-anchor="middle">user + reply: 280 tokens</text>
    <text x="80" y="124" fill="#c1cdde" font-size="11" text-anchor="middle" font-weight="600">total: 5,080 tokens</text>
    <text x="80" y="140" fill="#8ea0b8" font-size="10" text-anchor="middle">first-turn cold prefill</text>
  </g>

  <!-- Session C: three stacked turns -->
  <g transform="translate(625, 210)">
    <rect x="0" y="0" width="160" height="36" rx="5" fill="url(#turnFill)" stroke="#1a2538" stroke-width="0.5"/>
    <text x="80" y="15" fill="#0f1729" font-size="12" font-weight="700" text-anchor="middle">turn 1</text>
    <text x="80" y="29" fill="#0f1729" font-size="11" text-anchor="middle">290 tokens</text>
    <line x1="80" y1="38" x2="80" y2="44" stroke="#6b7d97" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="0" y="46" width="160" height="36" rx="5" fill="url(#turnFill)" stroke="#1a2538" stroke-width="0.5"/>
    <text x="80" y="61" fill="#0f1729" font-size="12" font-weight="700" text-anchor="middle">turn 2</text>
    <text x="80" y="75" fill="#0f1729" font-size="11" text-anchor="middle">410 tokens</text>
    <line x1="80" y1="84" x2="80" y2="90" stroke="#6b7d97" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="0" y="92" width="160" height="36" rx="5" fill="url(#turnFill)" stroke="#1a2538" stroke-width="0.5"/>
    <text x="80" y="107" fill="#0f1729" font-size="12" font-weight="700" text-anchor="middle">turn 3</text>
    <text x="80" y="121" fill="#0f1729" font-size="11" text-anchor="middle">380 tokens</text>
    <text x="80" y="148" fill="#c1cdde" font-size="11" text-anchor="middle" font-weight="600">total: 5,880 tokens</text>
  </g>

  <!-- Comparison panel -->
  <g transform="translate(0, 410)">
    <line x1="40" y1="0" x2="840" y2="0" stroke="#2a3a55" stroke-width="1"/>
    <text x="40" y="22" fill="#c1cdde" font-size="13" font-weight="600" letter-spacing="0.5">CACHE FOOTPRINT FOR THREE CONCURRENT SESSIONS</text>

    <!-- Two rows: naive and radix -->
    <g transform="translate(40, 38)">
      <!-- Naive row -->
      <text x="0" y="14" fill="#e8edf5" font-size="12" font-weight="700">Naive (per-session full cache)</text>
      <rect x="220" y="0" width="528" height="22" fill="#c87a52" opacity="0.85"/>
      <text x="740" y="15" fill="#0f1729" font-size="12" font-weight="700" text-anchor="end">16,400 tokens · 1.57 GB</text>

      <!-- Radix row -->
      <text x="0" y="48" fill="#e8edf5" font-size="12" font-weight="700">Radix tree (shared root)</text>
      <rect x="220" y="34" width="219" height="22" fill="#5dbb89" opacity="0.9"/>
      <text x="225" y="49" fill="#0f1729" font-size="12" font-weight="700" text-anchor="start">6,800 tokens · 651 MB</text>

      <!-- Savings annotation -->
      <text x="775" y="49" fill="#a3d3b6" font-size="12" font-weight="700" text-anchor="end">−58% memory</text>
    </g>
  </g>

  <!-- Footer note -->
  <g transform="translate(40, 530)">
    <text x="0" y="0" fill="#8ea0b8" font-size="11">LRU eviction walks from leaves toward the root, so the most-shared tokens are the last to leave the cache. New traffic evicts cold leaves first.</text>
  </g>
</svg>
