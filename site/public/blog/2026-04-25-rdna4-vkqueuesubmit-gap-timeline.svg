<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Per-layer vs per-prompt Vulkan submit timeline on a 60-layer RDNA4 prefill</title>
  <desc id="desc">A horizontal timeline of a 60-layer prefill on RDNA4. The top lane shows the current per-layer submit shape: 60 narrow GPU-work segments separated by 60 small CPU-and-submit gap markers that visibly accumulate across the prompt. A summary at the right reads twelve to twenty-four milliseconds of submit gap, depending on queue contention. The bottom lane shows the per-prompt submit shape: one continuous GPU-work block with a single submit gap at the front and a single fence wait at the back.</desc>
  <defs>
    <linearGradient id="bg-sub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfaf5"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow-sub" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .s-title { font: 700 30px Georgia, serif; fill: #10233c; }
      .s-sub { font: 500 16px Arial, sans-serif; fill: #53657b; }
      .s-section { font: 700 14px Arial, sans-serif; fill: #2c3e54; }
      .s-label { font: 600 14px Arial, sans-serif; fill: #10233c; }
      .s-value { font: 700 13px Arial, sans-serif; fill: #ffffff; }
      .s-value-out { font: 700 13px Arial, sans-serif; fill: #10233c; }
      .s-axis { font: 400 12px Arial, sans-serif; fill: #53657b; }
      .s-note { font: 400 13px Arial, sans-serif; fill: #445567; }
      .s-tag { font: 700 12px Arial, sans-serif; fill: #10233c; }
      .s-legend { font: 500 13px Arial, sans-serif; fill: #2c3e54; }
    </style>
  </defs>

  <rect width="1200" height="560" fill="url(#bg-sub)"/>

  <g transform="translate(72 44)">
    <text class="s-title">Where the submit gaps actually live in a 60-layer prefill</text>
    <text class="s-sub" x="0" y="28">Top lane: today's per-layer submit shape. Bottom lane: one vkQueueSubmit for the whole prompt. Same kernels, same dispatches, same total compute.</text>
  </g>

  <g transform="translate(0 120)" filter="url(#shadow-sub)">

    <!-- Lane A: per-layer submits -->
    <text class="s-section" x="72" y="24">Per-layer submits, 60 layers</text>
    <text class="s-note" x="72" y="44">Each thin vertical bar is one layer's GPU work. Each small amber tick between bars is one submit gap (CPU + amdgpu ioctl + scheduler hop).</text>

    <!-- Layer band: x=72..1090 = 1018 px wide; per layer ~14.5 px including gap -->
    <!-- 60 layers, each layer = 12 px GPU + 5 px gap = 17 px; 60*17 = 1020 px -->
    <g transform="translate(72 70)">
      <!-- Generate 60 GPU work bars (teal) and 59 amber gap ticks between them -->
      <!-- We'll inline them for SVG validity -->
      <!-- GPU bars at x=0,17,34,...,1003 (60 of them) -->
      <rect x="0"   y="0" width="12" height="60" rx="2" fill="#0f766e"/>
      <rect x="17"  y="0" width="12" height="60" rx="2" fill="#0f766e"/>
      <rect x="34"  y="0" width="12" height="60" rx="2" fill="#0f766e"/>
      <rect x="51"  y="0" width="12" height="60" rx="2" fill="#0f766e"/>
