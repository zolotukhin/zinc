      <!-- Tag annotations -->
      <text class="s-tag" x="0" y="-6">layer 1</text>
      <text class="s-tag" x="1015" y="-6" text-anchor="end">layer 60</text>
    </g>

    <!-- Lane A summary box -->
    <g transform="translate(72 152)">
      <rect x="0" y="0" width="1018" height="32" rx="4" fill="#fff5e6" stroke="#b45309" stroke-width="1"/>
      <text class="s-label" x="14" y="21" fill="#7c3a00">Cumulative submit gap across 60 layers: ~12 to 24 ms (best case), up to 120 ms under amdgpu queue contention.</text>
    </g>

    <text class="s-note" x="72" y="206">Read the top lane as a comb. The teeth are GPU work. The amber slivers between teeth are dead time the kernels cannot reach.</text>

    <!-- Lane B: per-prompt submit -->
    <text class="s-section" x="72" y="256">Per-prompt submit, 60 layers in one command buffer</text>
    <text class="s-note" x="72" y="276">One vkQueueSubmit at the front, one fence wait at the back. The recorder runs in parallel with the previous prompt under double-buffering.</text>

    <g transform="translate(72 302)">
      <!-- Single front submit gap -->
      <rect x="0" y="14" width="6" height="32" rx="1" fill="#b45309"/>
      <text class="s-tag" x="0" y="-6">submit</text>

      <!-- Single solid GPU work bar spanning all 60 layers -->
      <rect x="6" y="0" width="1003" height="60" rx="3" fill="#0f766e"/>
      <text class="s-value" x="507" y="35" text-anchor="middle">60 layers of GPU work, no scheduler hops between layers</text>

      <!-- Single fence wait at end -->
      <rect x="1009" y="14" width="6" height="32" rx="1" fill="#2563eb"/>
      <text class="s-tag" x="1015" y="-6" text-anchor="end">fence</text>
    </g>

    <!-- Lane B summary box -->
    <g transform="translate(72 384)">
      <rect x="0" y="0" width="1018" height="32" rx="4" fill="#e6f4f1" stroke="#0f766e" stroke-width="1"/>
      <text class="s-label" x="14" y="21" fill="#0a4d44">Cumulative submit cost: ~0.2 to 2 ms total. With AMD user-mode queues on Linux 6.16+, well under 0.1 ms.</text>
    </g>

    <!-- Legend -->
    <g transform="translate(72 438)">
      <rect x="0" y="6" width="14" height="14" rx="2" fill="#0f766e"/>
      <text class="s-legend" x="22" y="18">GPU work (kernels, dispatches, barriers)</text>
      <rect x="320" y="6" width="14" height="14" rx="2" fill="#b45309"/>
      <text class="s-legend" x="342" y="18">vkQueueSubmit gap (CPU + ioctl + scheduler)</text>
      <rect x="700" y="6" width="14" height="14" rx="2" fill="#2563eb"/>
      <text class="s-legend" x="722" y="18">vkWaitForFences (host sync)</text>
    </g>
