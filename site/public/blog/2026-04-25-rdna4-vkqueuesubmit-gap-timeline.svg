      <rect x="1003" y="0" width="12" height="60" rx="2" fill="#0f766e"/>

      <!-- Submit gap ticks (amber): 59 gaps, each at x=12,29,46,...,995 -->
      <rect x="12"  y="14" width="5" height="32" rx="1" fill="#b45309"/>
      <rect x="29"  y="14" width="5" height="32" rx="1" fill="#b45309"/>
      <rect x="46"  y="14" width="5" height="32" rx="1" fill="#b45309"/>
