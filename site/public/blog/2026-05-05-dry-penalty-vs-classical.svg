<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" role="img" aria-labelledby="title desc">
  <title id="title">DRY repetition penalty versus classical multiplicative repetition penalty as a function of verbatim-match length</title>
  <desc id="desc">A two-panel diagram. The left panel is a line chart with match length n on the x axis from zero to twelve and logit penalty on a logarithmic y axis from 0.01 to 1000. A green curve labeled DRY rises sharply from zero at n less than 2 to 0.8 at n equals 2, then 1.4 at n equals 3, then 4.3 at n equals 5, then 23 at n equals 8, then 70 at n equals 10, then 215 at n equals 12, traced as a smooth exponential. A red horizontal dashed line at 0.14 labeled classical repetition penalty 1.15 stays flat across the chart. A vertical orange dashed line at n equals 2 marks the allowed_length threshold. A shaded yellow band from n equals 8 to n equals 12 is labeled looping zone. The right panel is a token sequence schematic. The top row shows an earlier prompt span containing the seven tokens the cat sat on the mat period. The bottom row shows the current decode position with the five tokens the cat sat on the highlighted in green as a verbatim suffix match against the earlier span, followed by a candidate next token mat highlighted in red. An annotation states that the match would extend to length six, that the DRY penalty equals 0.8 times 1.75 to the fourth which is 7.5 logits, and that the classical repetition penalty equals 0.14 logits.</desc>

  <style>
    .bg { fill: #fafaf7; }
    .label { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; fill: #1f1f1f; }
    .label-small { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 10.5px; fill: #444; }
    .label-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; fill: #1f1f1f; }
    .label-mono-small { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; fill: #1f1f1f; }
    .label-bold { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; fill: #1f1f1f; font-weight: 600; }
    .title-text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; fill: #1f1f1f; font-weight: 600; }
    .panel-title { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; fill: #1f1f1f; font-weight: 600; }
    .axis { stroke: #1f1f1f; stroke-width: 1; fill: none; }
    .axis-tick { stroke: #1f1f1f; stroke-width: 0.8; }
    .grid { stroke: #d4d4d0; stroke-width: 0.6; stroke-dasharray: 2 3; fill: none; }
    .dry-curve { stroke: #15803d; stroke-width: 2.2; fill: none; }
    .dry-point { fill: #15803d; }
    .classical-line { stroke: #b91c1c; stroke-width: 1.6; stroke-dasharray: 6 4; fill: none; }
    .threshold-line { stroke: #ca8a04; stroke-width: 1.4; stroke-dasharray: 4 4; fill: none; }
    .looping-zone { fill: #fde68a; fill-opacity: 0.35; }
    .annotation-green { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11.5px; fill: #14532d; font-weight: 600; }
    .annotation-red { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11.5px; fill: #991b1b; font-weight: 600; }
    .annotation-amber { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; fill: #92400e; }
    .annotation { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; fill: #1f1f1f; }
    .token-box-neutral { fill: #f3f4f6; stroke: #94a3b8; stroke-width: 1; }
    .token-box-match { fill: #bbf7d0; stroke: #15803d; stroke-width: 1.2; }
    .token-box-candidate { fill: #fecaca; stroke: #b91c1c; stroke-width: 1.4; }
    .token-text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; fill: #111; text-anchor: middle; }
    .row-label { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; fill: #444; }
    .frame { fill: none; stroke: #1f1f1f; stroke-width: 1; }
    .arrow-stroke { stroke: #1f1f1f; stroke-width: 1.1; fill: none; }
    .arrow-head { fill: #1f1f1f; }
  </style>

  <rect class="bg" width="880" height="560" />

  <!-- Title -->
  <text class="title-text" x="440" y="26" text-anchor="middle">DRY versus classical repetition penalty across verbatim-match length</text>
  <text class="label-small" x="440" y="44" text-anchor="middle">Defaults: multiplier 0.8, base 1.75, allowed_length 2. Classical: multiplicative penalty 1.15 (logit shift ln(1.15) ≈ 0.14).</text>

  <!-- ============== Panel A (left): line chart ============== -->
  <text class="panel-title" x="100" y="76">Penalty magnitude vs. match length</text>
  <text class="label-small" x="100" y="92">Logit subtraction applied to the candidate that would extend a verbatim n-gram. Log y-axis.</text>

  <!-- Chart area: x 100-420, y 90-460 -->
  <!-- Looping zone shading n=8 to n=12 -->
  <rect class="looping-zone" x="313.3" y="90" width="106.7" height="370" />

  <!-- Grid lines for log decades -->
  <line class="grid" x1="100" y1="386" x2="420" y2="386" />
  <line class="grid" x1="100" y1="312" x2="420" y2="312" />
  <line class="grid" x1="100" y1="238" x2="420" y2="238" />
  <line class="grid" x1="100" y1="164" x2="420" y2="164" />

  <!-- Axes -->
  <line class="axis" x1="100" y1="460" x2="420" y2="460" />
  <line class="axis" x1="100" y1="90" x2="100" y2="460" />

  <!-- Y-axis ticks (log: 0.01, 0.1, 1, 10, 100, 1000) -->
  <line class="axis-tick" x1="96" y1="460" x2="100" y2="460" />
  <text class="label-small" x="92" y="464" text-anchor="end">0.01</text>
  <line class="axis-tick" x1="96" y1="386" x2="100" y2="386" />
  <text class="label-small" x="92" y="390" text-anchor="end">0.1</text>
  <line class="axis-tick" x1="96" y1="312" x2="100" y2="312" />
  <text class="label-small" x="92" y="316" text-anchor="end">1</text>
  <line class="axis-tick" x1="96" y1="238" x2="100" y2="238" />
  <text class="label-small" x="92" y="242" text-anchor="end">10</text>
  <line class="axis-tick" x1="96" y1="164" x2="100" y2="164" />
  <text class="label-small" x="92" y="168" text-anchor="end">100</text>
  <line class="axis-tick" x1="96" y1="90" x2="100" y2="90" />
  <text class="label-small" x="92" y="94" text-anchor="end">1000</text>

  <text class="label-small" x="56" y="275" text-anchor="middle" transform="rotate(-90 56 275)">logit penalty (subtractive)</text>

  <!-- X-axis ticks (n = 0, 2, 4, 6, 8, 10, 12) -->
  <line class="axis-tick" x1="100" y1="460" x2="100" y2="464" />
  <text class="label-small" x="100" y="476" text-anchor="middle">0</text>
  <line class="axis-tick" x1="153.3" y1="460" x2="153.3" y2="464" />
  <text class="label-small" x="153.3" y="476" text-anchor="middle">2</text>
  <line class="axis-tick" x1="206.7" y1="460" x2="206.7" y2="464" />
  <text class="label-small" x="206.7" y="476" text-anchor="middle">4</text>
  <line class="axis-tick" x1="260" y1="460" x2="260" y2="464" />
  <text class="label-small" x="260" y="476" text-anchor="middle">6</text>
  <line class="axis-tick" x1="313.3" y1="460" x2="313.3" y2="464" />
  <text class="label-small" x="313.3" y="476" text-anchor="middle">8</text>
  <line class="axis-tick" x1="366.7" y1="460" x2="366.7" y2="464" />
  <text class="label-small" x="366.7" y="476" text-anchor="middle">10</text>
  <line class="axis-tick" x1="420" y1="460" x2="420" y2="464" />
  <text class="label-small" x="420" y="476" text-anchor="middle">12</text>
  <text class="label-small" x="260" y="495" text-anchor="middle">match length n (tokens of verbatim suffix that match earlier span)</text>

  <!-- allowed_length threshold line at n=2 -->
  <line class="threshold-line" x1="153.3" y1="90" x2="153.3" y2="460" />
  <text class="annotation-amber" x="156" y="106">allowed_length = 2</text>
  <text class="annotation-amber" x="156" y="120">no penalty below this</text>

  <!-- Classical repetition penalty horizontal line at 0.14 -->
  <line class="classical-line" x1="100" y1="375.2" x2="420" y2="375.2" />
  <text class="annotation-red" x="262" y="370">classical 1.15: ~0.14 logits, flat</text>

  <!-- DRY curve: series of points connected by smooth path -->
  <!-- For n < 2 the penalty is 0; show the curve dropping off the chart at n = 1.99 -->
  <!-- Points: (n, x, y) at log scale -->
  <!-- (2, 153.3, 319.2) (3, 180, 301.2) (4, 206.7, 283.2) (5, 233.3, 265.2) (6, 260, 247.3) (7, 286.7, 229.3) (8, 313.3, 211.3) (9, 340, 193.3) (10, 366.7, 175.3) (11, 393.3, 157.3) (12, 420, 139.3) -->
  <path class="dry-curve" d="M 153.3 319.2 L 180 301.2 L 206.7 283.2 L 233.3 265.2 L 260 247.3 L 286.7 229.3 L 313.3 211.3 L 340 193.3 L 366.7 175.3 L 393.3 157.3 L 420 139.3" />

  <!-- Zero-penalty segment for n < 2 (show as flat line along bottom axis) -->
  <line class="dry-curve" x1="100" y1="458" x2="153.3" y2="458" />
  <line class="dry-curve" x1="153.3" y1="458" x2="153.3" y2="319.2" stroke-dasharray="3 3" />

  <!-- Highlight points -->
  <circle class="dry-point" cx="153.3" cy="319.2" r="3" />
  <circle class="dry-point" cx="206.7" cy="283.2" r="3" />
  <circle class="dry-point" cx="260" cy="247.3" r="3" />
  <circle class="dry-point" cx="313.3" cy="211.3" r="3" />
  <circle class="dry-point" cx="366.7" cy="175.3" r="3" />
  <circle class="dry-point" cx="420" cy="139.3" r="3" />

  <!-- Labels for key points -->
  <text class="annotation-green" x="159" y="316">0.8</text>
  <text class="annotation-green" x="265" y="244">7.5</text>
  <text class="annotation-green" x="319" y="208">23</text>
  <text class="annotation-green" x="372" y="172">70</text>
  <text class="annotation-green" x="380" y="136">215</text>

  <!-- DRY label -->
  <text class="annotation-green" x="200" y="320">DRY: 0.8 · 1.75^(n-2)</text>

  <!-- Looping zone label -->
  <text class="annotation-amber" x="367" y="455" text-anchor="middle">looping zone</text>

  <!-- ============== Panel B (right): token sequence schematic ============== -->
  <text class="panel-title" x="470" y="76">What "match length" means in the input</text>
  <text class="label-small" x="470" y="92">DRY scans backward from the decode position. The longest verbatim suffix match sets n.</text>

  <!-- Earlier prompt span row -->
  <text class="row-label" x="470" y="138">earlier in the prompt:</text>
  <!-- 7 tokens: "the", "cat", "sat", "on", "the", "mat", "." starting at x=470 -->
  <!-- Each box: width 50, gap 4 -->
  <g>
    <rect class="token-box-neutral" x="470" y="148" width="50" height="34" rx="3" />
    <text class="token-text" x="495" y="170">the</text>
    <rect class="token-box-neutral" x="524" y="148" width="50" height="34" rx="3" />
    <text class="token-text" x="549" y="170">cat</text>
    <rect class="token-box-neutral" x="578" y="148" width="50" height="34" rx="3" />
    <text class="token-text" x="603" y="170">sat</text>
    <rect class="token-box-neutral" x="632" y="148" width="50" height="34" rx="3" />
    <text class="token-text" x="657" y="170">on</text>
    <rect class="token-box-neutral" x="686" y="148" width="50" height="34" rx="3" />
    <text class="token-text" x="711" y="170">the</text>
    <rect class="token-box-neutral" x="740" y="148" width="50" height="34" rx="3" />
    <text class="token-text" x="765" y="170">mat</text>
    <rect class="token-box-neutral" x="794" y="148" width="50" height="34" rx="3" />
    <text class="token-text" x="819" y="170">.</text>
  </g>

  <!-- Bracket showing matching span (from "the cat sat on the" at x=470-735, to "mat" at x=740-790) -->
  <path class="arrow-stroke" d="M 470 192 L 470 200 L 735 200 L 735 192" />
  <text class="annotation-green" x="603" y="216" text-anchor="middle">5-token prefix that occurs again below</text>

  <!-- Indicate the candidate continuation in earlier span -->
  <path class="arrow-stroke" d="M 740 192 L 740 200 L 790 200 L 790 192" />
  <text class="annotation-red" x="765" y="216" text-anchor="middle">continued with</text>
  <text class="annotation-red" x="765" y="230" text-anchor="middle">"mat"</text>

  <!-- Arrow from earlier "mat" continuation down to current candidate to show penalty path -->
  <path class="arrow-stroke" d="M 765 244 L 765 296" />
  <polygon class="arrow-head" points="761,294 769,294 765,302" />

  <!-- Current decode position row -->
  <text class="row-label" x="470" y="332">current decode position (suffix matches above):</text>
  <g>
    <rect class="token-box-match" x="470" y="342" width="50" height="34" rx="3" />
    <text class="token-text" x="495" y="364">the</text>
    <rect class="token-box-match" x="524" y="342" width="50" height="34" rx="3" />
    <text class="token-text" x="549" y="364">cat</text>
    <rect class="token-box-match" x="578" y="342" width="50" height="34" rx="3" />
    <text class="token-text" x="603" y="364">sat</text>
    <rect class="token-box-match" x="632" y="342" width="50" height="34" rx="3" />
    <text class="token-text" x="657" y="364">on</text>
    <rect class="token-box-match" x="686" y="342" width="50" height="34" rx="3" />
    <text class="token-text" x="711" y="364">the</text>
    <rect class="token-box-candidate" x="740" y="342" width="50" height="34" rx="3" />
    <text class="token-text" x="765" y="364">mat</text>
  </g>

  <!-- Bracket showing matching suffix span -->
  <path class="arrow-stroke" d="M 470 386 L 470 394 L 735 394 L 735 386" />
  <text class="annotation-green" x="603" y="410" text-anchor="middle">verbatim suffix match: n = 5</text>

  <!-- Bracket for candidate -->
  <path class="arrow-stroke" d="M 740 386 L 740 394 L 790 394 L 790 386" />
  <text class="annotation-red" x="765" y="410" text-anchor="middle">candidate</text>

  <!-- Penalty box showing arithmetic -->
  <rect class="frame" x="470" y="430" width="370" height="58" rx="4" />
  <text class="label-bold" x="479" y="448">if model picks "mat", match becomes n = 6</text>
  <text class="label-mono" x="479" y="466">DRY penalty = 0.8 · 1.75^(6 − 2) = 0.8 · 9.38 ≈ 7.5 logits</text>
  <text class="label-mono" x="479" y="481">classical penalty (rep_pen 1.15) = ln(1.15) ≈ 0.14 logits</text>

  <!-- ============== Footer / shared legend ============== -->
  <line x1="100" y1="510" x2="160" y2="510" class="dry-curve" />
  <text class="label-small" x="166" y="514">DRY exponential</text>

  <line x1="280" y1="510" x2="340" y2="510" class="classical-line" />
  <text class="label-small" x="346" y="514">classical 1.15 multiplicative</text>

  <line x1="490" y1="510" x2="540" y2="510" class="threshold-line" />
  <text class="label-small" x="546" y="514">allowed_length threshold</text>

  <rect x="700" y="504" width="14" height="10" class="looping-zone" />
  <text class="label-small" x="720" y="514">looping zone (n ≥ 8)</text>

  <text class="label-small" x="440" y="540" text-anchor="middle">Classical penalty does not depend on match length. DRY climbs through three orders of magnitude across realistic match lengths.</text>
</svg>
