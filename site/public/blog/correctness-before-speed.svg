<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Correctness before speed</title>
  <desc id="desc">A staged ladder showing the order in which the ZINC project had to solve problems before optimization mattered.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfaf5"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 38px Georgia, serif; fill: #10233c; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #53657b; }
      .step { font: 700 22px Arial, sans-serif; fill: #10233c; }
      .copy { font: 400 16px Arial, sans-serif; fill: #445567; }
      .num { font: 700 34px Arial, sans-serif; fill: #ffffff; }
      .card { stroke-width: 2; rx: 28; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="url(#bg2)"/>
  <g transform="translate(72 58)">
    <text class="title">Correctness before speed</text>
    <text class="subtitle" x="0" y="34">The early project order was not optimize, optimize, optimize. It was make the model honest, make the state real, then trust the measurements.</text>
  </g>

  <g filter="url(#shadow2)">
    <rect class="card" x="90" y="160" width="1020" height="74" fill="#19324a" stroke="#19324a"/>
    <circle cx="138" cy="197" r="24" fill="#c8465f"/><text class="num" x="129" y="209">1</text>
    <text class="step" x="184" y="192" fill="#ffffff">Architecture first</text>
    <text class="copy" x="184" y="215" fill="#d7e1ea">Run the actual 40-layer network, not a fake shortcut. Attention, MoE, shared expert, and SSM all had to be real.</text>

    <rect class="card" x="130" y="250" width="980" height="74" fill="#244560" stroke="#244560"/>
    <circle cx="178" cy="287" r="24" fill="#dd7e3b"/><text class="num" x="169" y="299">2</text>
    <text class="step" x="224" y="282" fill="#ffffff">State second</text>
    <text class="copy" x="224" y="305" fill="#d7e1ea">Prefill had to populate KV cache and SSM state, and the page table / descriptor bindings had to stop lying to the kernels.</text>

    <rect class="card" x="170" y="340" width="940" height="74" fill="#2f5877" stroke="#2f5877"/>
    <circle cx="218" cy="377" r="24" fill="#5ea0c9"/><text class="num" x="209" y="389">3</text>
    <text class="step" x="264" y="372" fill="#ffffff">Numerics third</text>
    <text class="copy" x="264" y="395" fill="#d7e1ea">Count rows, inspect logits, compare tokens, verify RoPE and head dimensions. This is where the “97% zero logits” bug got exposed.</text>

    <rect class="card" x="210" y="430" width="900" height="74" fill="#3b6d8d" stroke="#3b6d8d"/>
    <circle cx="258" cy="467" r="24" fill="#78bf7a"/><text class="num" x="249" y="479">4</text>
    <text class="step" x="304" y="462" fill="#ffffff">Baseline and environment fourth</text>
    <text class="copy" x="304" y="485" fill="#d7e1ea">Pin Mesa, stabilize the llama.cpp reference, and make the benchmark environment trustworthy enough to learn from.</text>

    <rect class="card" x="250" y="520" width="860" height="74" fill="#4b86a7" stroke="#4b86a7"/>
    <circle cx="298" cy="557" r="24" fill="#9b7bd0"/><text class="num" x="289" y="569">5</text>
    <text class="step" x="344" y="552" fill="#ffffff">Only then: throughput work</text>
    <text class="copy" x="344" y="575" fill="#d7e1ea">After that, optimizations started to mean something: GPU-side SSM, lower dispatch overhead, better decode scheduling, fewer lies.</text>
  </g>
</svg>
