<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">Correctness before speed</title>
  <desc id="desc">A simple five-step sequence showing that architecture, state, numerics, reproducibility, and only then performance mattered in that order.</desc>
  <defs>
    <style>
      .title { font: 700 34px Georgia, serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #566272; }
      .step { font: 700 20px Arial, sans-serif; fill: #172033; }
      .copy { font: 400 15px Arial, sans-serif; fill: #4e5a69; }
      .num { font: 700 16px Arial, sans-serif; fill: #fff; }
      .pill { fill: #fbfaf6; stroke: #d8d3c8; stroke-width: 1.5; rx: 18; }
      .line { stroke: #8a94a3; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="330" fill="#fffdf8"/>
  <text class="title" x="72" y="62">Correctness before speed</text>
  <text class="subtitle" x="72" y="92">The early work only got useful once these five steps happened in order.</text>

  <path class="line" d="M146 188 H1054"/>

  <g transform="translate(72 136)">
    <circle cx="28" cy="52" r="20" fill="#a63a50"/><text class="num" x="22" y="58">1</text>
    <rect class="pill" x="58" y="12" width="170" height="80"/>
    <text class="step" x="78" y="46">Architecture</text>
    <text class="copy" x="78" y="70">Run the real</text>
    <text class="copy" x="78" y="88">40-layer model</text>
  </g>

  <g transform="translate(292 136)">
    <circle cx="28" cy="52" r="20" fill="#cd6f36"/><text class="num" x="22" y="58">2</text>
    <rect class="pill" x="58" y="12" width="170" height="80"/>
    <text class="step" x="78" y="46">State</text>
    <text class="copy" x="78" y="70">Populate KV and</text>
    <text class="copy" x="78" y="88">SSM state honestly</text>
  </g>

  <g transform="translate(512 136)">
    <circle cx="28" cy="52" r="20" fill="#4f8eb0"/><text class="num" x="22" y="58">3</text>
    <rect class="pill" x="58" y="12" width="170" height="80"/>
    <text class="step" x="78" y="46">Numerics</text>
    <text class="copy" x="78" y="70">Count rows, compare</text>
    <text class="copy" x="78" y="88">tokens, inspect logits</text>
  </g>

  <g transform="translate(732 136)">
    <circle cx="28" cy="52" r="20" fill="#4f9b74"/><text class="num" x="22" y="58">4</text>
    <rect class="pill" x="58" y="12" width="170" height="80"/>
    <text class="step" x="78" y="46">Reproducibility</text>
    <text class="copy" x="78" y="70">Pin the driver and</text>
    <text class="copy" x="78" y="88">stabilize the baseline</text>
  </g>

  <g transform="translate(952 136)">
    <circle cx="28" cy="52" r="20" fill="#6b63b7"/><text class="num" x="22" y="58">5</text>
    <rect class="pill" x="58" y="12" width="150" height="80"/>
    <text class="step" x="78" y="46">Performance</text>
    <text class="copy" x="78" y="70">Only then did</text>
    <text class="copy" x="78" y="88">throughput matter</text>
  </g>
</svg>
