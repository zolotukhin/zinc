<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Where the early inference failures clustered</title>
  <desc id="desc">A simplified pipeline map showing the main failure zones in tokenization, architecture, attention, decode state, and logits.</desc>
  <defs>
    <style>
      .title { font: 700 34px Georgia, serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #566272; }
      .label { font: 700 14px Arial, sans-serif; fill: #8b3b2f; letter-spacing: 0.08em; }
      .name { font: 700 24px Arial, sans-serif; fill: #172033; }
      .copy { font: 400 16px Arial, sans-serif; fill: #4e5a69; }
      .chip { font: 700 14px Arial, sans-serif; fill: #7a2234; }
      .card { fill: #fbfaf6; stroke: #d8d3c8; stroke-width: 1.5; rx: 18; }
      .line { stroke: #8a94a3; stroke-width: 2.5; fill: none; }
      .dot { fill: #172033; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="#fffdf8"/>
  <text class="title" x="72" y="62">Where the early failures clustered</text>
  <text class="subtitle" x="72" y="92">Most of the debugging pain sat in five zones, not everywhere at once.</text>

  <path class="line" d="M122 220 H1078"/>
  <circle class="dot" cx="122" cy="220" r="5"/>
  <circle class="dot" cx="366" cy="220" r="5"/>
  <circle class="dot" cx="610" cy="220" r="5"/>
  <circle class="dot" cx="854" cy="220" r="5"/>
  <circle class="dot" cx="1078" cy="220" r="5"/>

  <rect class="card" x="72" y="140" width="180" height="120"/>
  <text class="label" x="92" y="168">INPUT</text>
  <text class="name" x="92" y="200">Tokenizer</text>
  <text class="copy" x="92" y="228">GPT-2 byte mapping</text>
  <text class="chip" x="92" y="246">Wrong spaces, wrong tokens</text>

  <rect class="card" x="276" y="140" width="180" height="120"/>
  <text class="label" x="296" y="168">MODEL</text>
  <text class="name" x="296" y="200">Architecture</text>
  <text class="copy" x="296" y="228">MoE plus SSM split</text>
  <text class="chip" x="296" y="246">Wrong mental model first</text>

  <rect class="card" x="480" y="140" width="180" height="120"/>
  <text class="label" x="500" y="168">ATTENTION</text>
  <text class="name" x="500" y="200">RoPE</text>
  <text class="copy" x="500" y="228">Partial rotation, head size</text>
  <text class="chip" x="500" y="246">Quiet vector corruption</text>

  <rect class="card" x="684" y="140" width="180" height="120"/>
  <text class="label" x="704" y="168">DECODE STATE</text>
  <text class="name" x="704" y="200">KV cache</text>
  <text class="copy" x="704" y="228">Prefill writes, page IDs</text>
  <text class="chip" x="704" y="246">Empty or misbound state</text>

  <rect class="card" x="888" y="140" width="240" height="120"/>
  <text class="label" x="908" y="168">OUTPUT</text>
  <text class="name" x="908" y="200">Logits</text>
  <text class="copy" x="908" y="228">Dispatch geometry and coverage</text>
  <text class="chip" x="908" y="246">97% of vocab accidentally zero</text>

  <text class="copy" x="72" y="320">Two sub-systems amplified the confusion underneath this path: the shared-expert MoE branch and the recurrent SSM path.</text>
</svg>
