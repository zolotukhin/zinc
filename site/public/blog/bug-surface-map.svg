<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Where the early ZINC bugs actually lived</title>
  <desc id="desc">A clean pipeline diagram showing tokenization, architecture, RoPE, KV cache, flash attention, MoE, SSM, and logits.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcfbf7"/>
      <stop offset="100%" stop-color="#f2efe6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 38px Georgia, serif; fill: #14213d; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #526071; }
      .box-title { font: 700 22px Arial, sans-serif; fill: #14213d; }
      .box-copy { font: 400 16px Arial, sans-serif; fill: #465466; }
      .chip { font: 700 14px Arial, sans-serif; fill: #8b1e3f; }
      .label { font: 700 15px Arial, sans-serif; fill: #6b7280; letter-spacing: 0.08em; }
      .card { fill: #fffdf8; stroke: #d9d1bf; stroke-width: 2; rx: 26; }
      .warn { fill: #fff1d6; stroke: #f0c36a; stroke-width: 2; rx: 22; }
      .accent { fill: #e7f0ff; stroke: #8db3e8; stroke-width: 2; rx: 22; }
      .arrow { stroke: #6c7b88; stroke-width: 4; fill: none; stroke-linecap: round; }
      .dash { stroke: #b77c8f; stroke-width: 3; fill: none; stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <g transform="translate(70 58)">
    <text class="title">Where the early bugs actually lived</text>
    <text class="subtitle" x="0" y="34">The failures clustered in a few specific parts of the inference path, which is why the project felt chaotic before it felt fast.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="70" y="150" width="180" height="140"/>
    <text class="label" x="94" y="185">INPUT</text>
    <text class="box-title" x="94" y="220">Tokenizer</text>
    <text class="box-copy" x="94" y="250">GPT-2 byte mapping</text>
    <text class="box-copy" x="94" y="274">and merge rules.</text>
    <text class="chip" x="94" y="312">Wrong spaces, wrong tokens</text>

    <rect class="card" x="290" y="150" width="220" height="140"/>
    <text class="label" x="314" y="185">MODEL SHAPE</text>
    <text class="box-title" x="314" y="220">Architecture</text>
    <text class="box-copy" x="314" y="250">40-layer stack, MoE path,</text>
    <text class="box-copy" x="314" y="274">shared expert, SSM split.</text>
    <text class="chip" x="314" y="312">Wrong mental model first</text>

    <rect class="accent" x="550" y="150" width="190" height="140"/>
    <text class="label" x="574" y="185">ATTENTION MATH</text>
    <text class="box-title" x="574" y="220">RoPE</text>
    <text class="box-copy" x="574" y="250">Partial rotation and</text>
    <text class="box-copy" x="574" y="274">correct head dimensions.</text>
    <text class="chip" x="574" y="312">Quiet vector corruption</text>

    <rect class="warn" x="780" y="150" width="180" height="140"/>
    <text class="label" x="804" y="185">STATE</text>
    <text class="box-title" x="804" y="220">KV Cache</text>
    <text class="box-copy" x="804" y="250">Prefill writes, page IDs,</text>
    <text class="box-copy" x="804" y="274">decode state continuity.</text>
    <text class="chip" x="804" y="312">Empty or misbound state</text>

    <rect class="warn" x="990" y="150" width="140" height="140"/>
    <text class="label" x="1014" y="185">KERNEL</text>
    <text class="box-title" x="1014" y="220">Flash Attn</text>
    <text class="box-copy" x="1014" y="250">Descriptor bindings</text>
    <text class="box-copy" x="1014" y="274">and page lookups.</text>
    <text class="chip" x="1014" y="312">GPU hangs</text>

    <rect class="card" x="340" y="390" width="200" height="120"/>
    <text class="label" x="364" y="425">BRANCH</text>
    <text class="box-title" x="364" y="458">MoE</text>
    <text class="box-copy" x="364" y="486">Top-k experts plus</text>
    <text class="box-copy" x="364" y="508">the shared expert path.</text>

    <rect class="card" x="580" y="390" width="200" height="120"/>
    <text class="label" x="604" y="425">BRANCH</text>
    <text class="box-title" x="604" y="458">SSM</text>
    <text class="box-copy" x="604" y="486">Delta-net style recurrent</text>
    <text class="box-copy" x="604" y="508">state and CPU updates.</text>

    <rect class="accent" x="840" y="390" width="220" height="120"/>
    <text class="label" x="864" y="425">OUTPUT</text>
    <text class="box-title" x="864" y="458">Logits</text>
    <text class="box-copy" x="864" y="486">LM head coverage and</text>
    <text class="box-copy" x="864" y="508">dispatch geometry.</text>
  </g>

  <path class="arrow" d="M250 220 H290"/>
  <path class="arrow" d="M510 220 H550"/>
  <path class="arrow" d="M740 220 H780"/>
  <path class="arrow" d="M960 220 H990"/>
  <path class="dash" d="M400 290 V390"/>
  <path class="dash" d="M660 290 V390"/>
  <path class="arrow" d="M780 450 H840"/>

  <circle cx="250" cy="220" r="6" fill="#6c7b88"/>
  <circle cx="510" cy="220" r="6" fill="#6c7b88"/>
  <circle cx="740" cy="220" r="6" fill="#6c7b88"/>
  <circle cx="960" cy="220" r="6" fill="#6c7b88"/>
  <circle cx="400" cy="390" r="6" fill="#b77c8f"/>
  <circle cx="660" cy="390" r="6" fill="#b77c8f"/>
  <circle cx="840" cy="450" r="6" fill="#6c7b88"/>
</svg>
