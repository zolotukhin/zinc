<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>

  <!-- Panel 1 -->
  <rect x="10" y="10" width="380" height="400" rx="12" fill="url(#bg1)" stroke="#30365a" stroke-width="2"/>
  <text x="200" y="48" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="600" letter-spacing="1.5">STEP 1</text>
  <rect x="40" y="70" width="320" height="50" rx="8" fill="#21262d" stroke="#30365a" stroke-width="1"/>
  <text x="200" y="101" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Parse the GGUF header</text>

  <!-- Simple file icon -->
  <rect x="150" y="150" width="100" height="120" rx="4" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <polyline points="150,150 150,138 162,138 175,150" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="200" y="200" text-anchor="middle" fill="#7ee787" font-size="12" font-family="monospace">magic: GGUF</text>
  <text x="200" y="218" text-anchor="middle" fill="#7ee787" font-size="12" font-family="monospace">version: 3</text>
  <text x="200" y="236" text-anchor="middle" fill="#7ee787" font-size="12" font-family="monospace">tensors: 562</text>

  <text x="200" y="310" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="600">Done in 589 lines</text>
  <text x="200" y="370" text-anchor="middle" fill="#8b949e" font-size="42">:)</text>

  <!-- Panel 2 -->
  <rect x="410" y="10" width="380" height="400" rx="12" fill="url(#bg2)" stroke="#30365a" stroke-width="2"/>
  <text x="600" y="48" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="600" letter-spacing="1.5">STEP 2</text>
  <rect x="440" y="70" width="320" height="50" rx="8" fill="#21262d" stroke="#30365a" stroke-width="1"/>
  <text x="600" y="101" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Draw the rest of the engine</text>

  <!-- Chaotic boxes -->
  <rect x="435" y="135" width="72" height="24" rx="3" fill="#21262d" stroke="#f85149" stroke-width="1"/>
