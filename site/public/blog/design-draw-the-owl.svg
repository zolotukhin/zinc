  <rect x="505" y="168" width="82" height="24" rx="3" fill="#21262d" stroke="#f85149" stroke-width="1"/>
  <text x="546" y="184" text-anchor="middle" fill="#f85149" font-size="9">KV Cache</text>

  <rect x="595" y="168" width="72" height="24" rx="3" fill="#21262d" stroke="#f0883e" stroke-width="1"/>
