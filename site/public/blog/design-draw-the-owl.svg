  <rect x="595" y="267" width="72" height="24" rx="3" fill="#21262d" stroke="#58a6ff" stroke-width="1"/>
  <text x="631" y="283" text-anchor="middle" fill="#58a6ff" font-size="9">Chat UI</text>

  <rect x="675" y="267" width="82" height="24" rx="3" fill="#21262d" stroke="#3fb950" stroke-width="1"/>
  <text x="716" y="283" text-anchor="middle" fill="#3fb950" font-size="9">Sampling</text>

  <rect x="435" y="300" width="72" height="24" rx="3" fill="#21262d" stroke="#f85149" stroke-width="1"/>
  <text x="471" y="316" text-anchor="middle" fill="#f85149" font-size="9">Vulkan</text>

  <rect x="515" y="300" width="62" height="24" rx="3" fill="#21262d" stroke="#f0883e" stroke-width="1"/>
  <text x="546" y="316" text-anchor="middle" fill="#f0883e" font-size="9">Metal</text>

  <rect x="585" y="300" width="72" height="24" rx="3" fill="#21262d" stroke="#d2a8ff" stroke-width="1"/>
  <text x="621" y="316" text-anchor="middle" fill="#d2a8ff" font-size="9">BPE</text>

  <rect x="665" y="300" width="92" height="24" rx="3" fill="#21262d" stroke="#58a6ff" stroke-width="1"/>
  <text x="711" y="316" text-anchor="middle" fill="#58a6ff" font-size="8">x40 layers...</text>

  <!-- Chaotic connecting lines -->
  <line x1="471" y1="159" x2="546" y2="168" stroke="#30365a" stroke-width="0.8"/>
  <line x1="551" y1="159" x2="476" y2="201" stroke="#30365a" stroke-width="0.8"/>
  <line x1="631" y1="159" x2="566" y2="201" stroke="#30365a" stroke-width="0.8"/>
  <line x1="716" y1="159" x2="646" y2="201" stroke="#30365a" stroke-width="0.8"/>
  <line x1="466" y1="192" x2="561" y2="234" stroke="#30365a" stroke-width="0.8"/>
  <line x1="546" y1="192" x2="471" y2="234" stroke="#30365a" stroke-width="0.8"/>
  <line x1="631" y1="192" x2="721" y2="234" stroke="#30365a" stroke-width="0.8"/>
  <line x1="476" y1="225" x2="556" y2="267" stroke="#30365a" stroke-width="0.8"/>
  <line x1="566" y1="225" x2="631" y2="267" stroke="#30365a" stroke-width="0.8"/>
  <line x1="646" y1="258" x2="476" y2="267" stroke="#30365a" stroke-width="0.8"/>
  <line x1="721" y1="258" x2="716" y2="267" stroke="#30365a" stroke-width="0.8"/>

  <text x="600" y="365" text-anchor="middle" fill="#f85149" font-size="14" font-weight="600">~22,000 lines of Zig</text>
  <text x="600" y="390" text-anchor="middle" fill="#8b949e" font-size="42">:|</text>
