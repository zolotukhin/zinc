  <rect x="435" y="201" width="82" height="24" rx="3" fill="#21262d" stroke="#58a6ff" stroke-width="1"/>
  <text x="476" y="217" text-anchor="middle" fill="#58a6ff" font-size="9">DMMV Q4_K</text>

  <rect x="525" y="201" width="82" height="24" rx="3" fill="#21262d" stroke="#3fb950" stroke-width="1"/>
