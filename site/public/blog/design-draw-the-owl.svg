  <rect x="515" y="135" width="72" height="24" rx="3" fill="#21262d" stroke="#f0883e" stroke-width="1"/>
  <text x="551" y="151" text-anchor="middle" fill="#f0883e" font-size="9">Embedding</text>

  <rect x="595" y="135" width="72" height="24" rx="3" fill="#21262d" stroke="#d2a8ff" stroke-width="1"/>
  <text x="631" y="151" text-anchor="middle" fill="#d2a8ff" font-size="9">RMS Norm</text>

  <rect x="675" y="135" width="82" height="24" rx="3" fill="#21262d" stroke="#58a6ff" stroke-width="1"/>
