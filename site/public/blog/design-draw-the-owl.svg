  <rect x="615" y="234" width="62" height="24" rx="3" fill="#21262d" stroke="#3fb950" stroke-width="1"/>
  <text x="646" y="250" text-anchor="middle" fill="#3fb950" font-size="9">Softmax</text>

  <rect x="685" y="234" width="72" height="24" rx="3" fill="#21262d" stroke="#f85149" stroke-width="1"/>
  <text x="721" y="250" text-anchor="middle" fill="#f85149" font-size="9">Sigmoid</text>

