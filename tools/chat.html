<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ZINC Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; color: #e94560; }
header .status { font-size: 12px; color: #666; }
header .status.ok { color: #4ecca3; }
.config { padding: 8px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; gap: 8px; align-items: center; font-size: 13px; }
.config input { background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 4px 8px; border-radius: 4px; font-size: 13px; }
.config input#api-url { width: 300px; }
.config button { background: #0f3460; color: #e0e0e0; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.config button:hover { background: #e94560; }
#messages { flex: 1; overflow-y: auto; padding: 20px; }
.msg { margin-bottom: 16px; max-width: 80%; }
.msg.user { margin-left: auto; }
.msg .bubble { padding: 10px 14px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg.user .bubble { background: #0f3460; }
.msg.assistant .bubble { background: #16213e; border: 1px solid #0f3460; }
.msg .role { font-size: 11px; color: #666; margin-bottom: 4px; }
.msg.user .role { text-align: right; }
.msg .meta { font-size: 11px; color: #7f8aa6; margin-top: 4px; }
.reasoning { margin: 0 0 10px; border: 1px solid #0f3460; border-radius: 10px; background: #12203a; overflow: hidden; }
.reasoning summary { cursor: pointer; color: #9aa6c1; font-size: 12px; list-style: none; padding: 8px 12px; user-select: none; }
.reasoning summary::-webkit-details-marker { display: none; }
.reasoning[open] summary { color: #e0e0e0; }
.reasoning .body { padding: 0 12px 12px; color: #9aa6c1; font-size: 13px; line-height: 1.6; white-space: pre-wrap; border-top: 1px solid #0f3460; }
.reasoning .placeholder { opacity: 0.85; font-style: italic; }
#input-area { padding: 12px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 8px; }
#input-area textarea { flex: 1; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 10px; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; min-height: 44px; max-height: 120px; }
#input-area textarea:focus { outline: none; border-color: #e94560; }
#input-area button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
#input-area button:hover { background: #c73550; }
#input-area button:disabled { background: #333; cursor: not-allowed; }
.typing { color: #4ecca3; font-style: italic; font-size: 13px; padding: 4px 14px; }
</style>
</head>
<body>
<header>
  <h1>ZINC Chat</h1>
  <span id="status" class="status">Connecting...</span>
  <span id="model-name" class="status"></span>
  <span id="stats" class="status"></span>
</header>
<div class="config">
  <label>API:</label>
  <input type="text" id="api-url" value="http://localhost:9090/v1">
  <button onclick="checkHealth()">Connect</button>
  <label style="margin-left:12px">Max tokens:</label>
  <input type="number" id="max-tokens" value="256" style="width:60px">
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" placeholder="Type a message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="send-btn" onclick="send()">Send</button>
</div>
<script>
const messagesDiv = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');
const modelEl = document.getElementById('model-name');
const statsEl = document.getElementById('stats');
const apiUrlInput = document.getElementById('api-url');
let conversationHistory = [];

// Auto-detect: if served from a remote host, use that host
if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
  apiUrlInput.value = `http://${location.hostname}:9090/v1`;
}

function getApiUrl() { return apiUrlInput.value.replace(/\/+$/, ''); }

async function checkHealth() {
  try {
    const base = getApiUrl().replace(/\/v1$/, '');
    const r = await fetch(base + '/health');
    const d = await r.json();
    if (d.status === 'ok') {
      statusEl.textContent = 'Connected';
      statusEl.className = 'status ok';
      // Get model name
      const mr = await fetch(getApiUrl() + '/models');
      const md = await mr.json();
      if (md.data && md.data[0]) modelEl.textContent = md.data[0].id;
    }
  } catch(e) {
    statusEl.textContent = 'Disconnected: ' + e.message;
    statusEl.className = 'status';
  }
}

function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  msg.innerHTML = `<div class="role">${role}</div><div class="bubble">${escapeHtml(content)}</div>`;
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return msg.querySelector('.bubble');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderReasoningBlock(text, isPartial) {
  const trimmed = text.trim();
  if (!trimmed && !isPartial) return '';
  const label = isPartial ? 'Thinking...' : 'Reasoning';
  const body = trimmed ? escapeHtml(trimmed) : '<span class="placeholder">Waiting for reasoning...</span>';
  return `<details class="reasoning"${isPartial ? ' open' : ''}><summary>${label}</summary><div class="body">${body}</div></details>`;
}

function stripLeadingThinkNoise(text) {
  const firstThink = text.indexOf('<think>');
  if (firstThink <= 0 || firstThink > 24) return text;
  const prefix = text.slice(0, firstThink).trim();
  if (!prefix) return text.slice(firstThink);
  if (prefix.length <= 8 && !/\s/.test(prefix)) return text.slice(firstThink);
  return text;
}

function renderAssistant(raw) {
  const normalized = stripLeadingThinkNoise(raw
    .replace(/<\|im_start\|>\w*\n?/g, '')
    .replace(/<\|im_end\|>/g, ''));
  let html = '';
  let cursor = 0;
  while (cursor < normalized.length) {
    const thinkStart = normalized.indexOf('<think>', cursor);
    if (thinkStart === -1) {
      const tail = normalized.slice(cursor).trim();
      if (tail) html += escapeHtml(tail).replace(/\n/g, '<br>');
      break;
    }

    const before = normalized.slice(cursor, thinkStart).trim();
    if (before) html += escapeHtml(before).replace(/\n/g, '<br>');

    const bodyStart = thinkStart + '<think>'.length;
    const thinkEnd = normalized.indexOf('</think>', bodyStart);
    if (thinkEnd === -1) {
      html += renderReasoningBlock(normalized.slice(bodyStart), true);
      break;
    }

    html += renderReasoningBlock(normalized.slice(bodyStart, thinkEnd), false);
    cursor = thinkEnd + '</think>'.length;
  }

  const cleanAnswer = normalized
    .replace(/<think>[\s\S]*?<\/think>\s*/g, ' ')
    .replace(/<think>[\s\S]*$/g, ' ')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
  if (!html && cleanAnswer) html = escapeHtml(cleanAnswer).replace(/\n/g, '<br>');
  return { html, cleanAnswer };
}

function formatDuration(ms) {
  const secs = Math.max(ms, 0) / 1000;
  return (secs >= 10 ? secs.toFixed(0) : secs.toFixed(1)) + 's';
}

function formatRate(tokens, ms) {
  if (tokens <= 0 || ms <= 0) return null;
  return (tokens / (ms / 1000)).toFixed(1);
}

function buildLiveStats(startedAt, firstTokenAt, streamedTokens) {
  const now = performance.now();
  if (!firstTokenAt) return 'Prefill ' + formatDuration(now - startedAt);
  const parts = ['TTFT ' + formatDuration(firstTokenAt - startedAt)];
  const rate = formatRate(Math.max(streamedTokens - 1, 0), now - firstTokenAt);
  parts.push(rate ? rate + ' tok/s' : 'Generating...');
  return parts.join(' · ');
}

function buildFinalStats(startedAt, firstTokenAt, streamedTokens) {
  const endedAt = performance.now();
  const totalMs = endedAt - startedAt;
  if (!firstTokenAt) {
    return {
      header: 'No output · ' + formatDuration(totalMs),
      meta: '0 streamed · ' + formatDuration(totalMs) + ' total',
    };
  }
  const ttftMs = firstTokenAt - startedAt;
  const genMs = endedAt - firstTokenAt;
  const rate = formatRate(Math.max(streamedTokens - 1, 0), genMs);
  return {
    header: 'TTFT ' + formatDuration(ttftMs) + (rate ? ' · ' + rate + ' tok/s' : ''),
    meta: streamedTokens + ' streamed · TTFT ' + formatDuration(ttftMs) + (rate ? ' · ' + rate + ' gen tok/s' : '') + ' · ' + formatDuration(totalMs) + ' total',
  };
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  const bubble = addMessage('assistant', '');
  let fullText = '';
  let streamedTokens = 0;
  let requestStartedAt = performance.now();
  let firstTokenAt = 0;
  statsEl.textContent = 'Prefill 0.0s';

  try {
    const maxTokens = parseInt(document.getElementById('max-tokens').value) || 256;
    const response = await fetch(getApiUrl() + '/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelEl.textContent || 'qwen',
        messages: conversationHistory,
        stream: true,
        max_tokens: maxTokens,
        temperature: 0.7,
      }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const chunk = JSON.parse(data);
          const content = chunk.choices?.[0]?.delta?.content;
          if (content) {
            if (content.includes('<|im_end') || content.includes('<|im_start')) continue;
            if (!firstTokenAt) firstTokenAt = performance.now();
            streamedTokens++;
            fullText += content;
            const rendered = renderAssistant(fullText);
            bubble.innerHTML = rendered.html;
            statsEl.textContent = buildLiveStats(requestStartedAt, firstTokenAt, streamedTokens);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
          }
        } catch(e) {}
      }
      if (!firstTokenAt) statsEl.textContent = buildLiveStats(requestStartedAt, firstTokenAt, streamedTokens);
    }
    const rendered = renderAssistant(fullText);
    bubble.innerHTML = rendered.html;
    const stats = buildFinalStats(requestStartedAt, firstTokenAt, streamedTokens);
    statsEl.textContent = stats.header;
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = stats.meta;
    bubble.parentElement.appendChild(meta);
    conversationHistory.push({ role: 'assistant', content: rendered.cleanAnswer });
  } catch(e) {
    bubble.textContent = 'Error: ' + e.message;
  }
  sendBtn.disabled = false;
  input.focus();
}

// Auto-resize textarea
input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

checkHealth();
</script>
</body>
</html>
