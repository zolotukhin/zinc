<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ZINC Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; color: #e94560; }
header .status { font-size: 12px; color: #666; }
header .status.ok { color: #4ecca3; }
.config { padding: 8px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; gap: 8px; align-items: center; font-size: 13px; }
.config input { background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 4px 8px; border-radius: 4px; font-size: 13px; }
.config input#api-url { width: 300px; }
.config button { background: #0f3460; color: #e0e0e0; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.config button:hover { background: #e94560; }
#messages { flex: 1; overflow-y: auto; padding: 20px; }
.msg { margin-bottom: 16px; max-width: 80%; }
.msg.user { margin-left: auto; }
.msg .bubble { padding: 10px 14px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg.user .bubble { background: #0f3460; }
.msg.assistant .bubble { background: #16213e; border: 1px solid #0f3460; }
.msg .role { font-size: 11px; color: #666; margin-bottom: 4px; }
.msg.user .role { text-align: right; }
#input-area { padding: 12px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 8px; }
#input-area textarea { flex: 1; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; padding: 10px; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; min-height: 44px; max-height: 120px; }
#input-area textarea:focus { outline: none; border-color: #e94560; }
#input-area button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
#input-area button:hover { background: #c73550; }
#input-area button:disabled { background: #333; cursor: not-allowed; }
.typing { color: #4ecca3; font-style: italic; font-size: 13px; padding: 4px 14px; }
</style>
</head>
<body>
<header>
  <h1>ZINC Chat</h1>
  <span id="status" class="status">Connecting...</span>
  <span id="model-name" class="status"></span>
</header>
<div class="config">
  <label>API:</label>
  <input type="text" id="api-url" value="http://localhost:9090/v1">
  <button onclick="checkHealth()">Connect</button>
  <label style="margin-left:12px">Max tokens:</label>
  <input type="number" id="max-tokens" value="256" style="width:60px">
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" placeholder="Type a message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="send-btn" onclick="send()">Send</button>
</div>
<script>
const messagesDiv = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');
const modelEl = document.getElementById('model-name');
const apiUrlInput = document.getElementById('api-url');
let conversationHistory = [];

// Auto-detect: if served from a remote host, use that host
if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
  apiUrlInput.value = `http://${location.hostname}:9090/v1`;
}

function getApiUrl() { return apiUrlInput.value.replace(/\/+$/, ''); }

async function checkHealth() {
  try {
    const base = getApiUrl().replace(/\/v1$/, '');
    const r = await fetch(base + '/health');
    const d = await r.json();
    if (d.status === 'ok') {
      statusEl.textContent = 'Connected';
      statusEl.className = 'status ok';
      // Get model name
      const mr = await fetch(getApiUrl() + '/models');
      const md = await mr.json();
      if (md.data && md.data[0]) modelEl.textContent = md.data[0].id;
    }
  } catch(e) {
    statusEl.textContent = 'Disconnected: ' + e.message;
    statusEl.className = 'status';
  }
}

function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  msg.innerHTML = `<div class="role">${role}</div><div class="bubble">${escapeHtml(content)}</div>`;
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return msg.querySelector('.bubble');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  const bubble = addMessage('assistant', '');
  let fullText = '';

  try {
    const maxTokens = parseInt(document.getElementById('max-tokens').value) || 256;
    const response = await fetch(getApiUrl() + '/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelEl.textContent || 'qwen',
        messages: conversationHistory,
        stream: true,
        max_tokens: maxTokens,
        temperature: 0.7,
      }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const chunk = JSON.parse(data);
          const content = chunk.choices?.[0]?.delta?.content;
          if (content) {
            fullText += content;
            bubble.textContent = fullText;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
          }
        } catch(e) {}
      }
    }
    conversationHistory.push({ role: 'assistant', content: fullText });
  } catch(e) {
    bubble.textContent = 'Error: ' + e.message;
  }
  sendBtn.disabled = false;
  input.focus();
}

// Auto-resize textarea
input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

checkHealth();
</script>
</body>
</html>
