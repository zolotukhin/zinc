name: Claude Auto Review
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    env:
      API_TIMEOUT_MS: 3000000
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      # GLM Coding Plan documented defaults for Claude Code.
      ANTHROPIC_DEFAULT_HAIKU_MODEL: glm-4.5-air
      ANTHROPIC_DEFAULT_SONNET_MODEL: glm-4.7
      ANTHROPIC_DEFAULT_OPUS_MODEL: glm-4.7
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          # claude-code-action fetches refs before it sets up its own auth.
          persist-credentials: true

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ github.token }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations

            The checked out workspace is the trusted base branch, not the PR branch.
            Review the pull request via GitHub APIs and `gh pr diff` / `gh pr view`.
            Do not checkout the PR branch.
            Do not execute repository code from the PR.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
